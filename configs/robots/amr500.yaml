# Addverb AMR500 — from fleet_core ActionCodes.yaml (source of truth)
# Source: Main_robotics/fleet_core/fleet_core_assets/models/agents/amr500/ActionCodes.yaml
# Variant: V_500, Attachment: Lifter, Motion: BIDIRECTIONAL

name: "AMR500"
type: bidirectional
path_follower: "Curved"

motion:
  max_linear_velocity: 0.8        # ActionCodes: maxLinearVelocity
  max_linear_velocity_curve: 0.8   # ActionCodes: maxLinearVelocityCurve
  max_lateral_velocity: 0.8        # ActionCodes: maxLateralVelocity
  max_angular_velocity: 1.57       # ActionCodes: maxAngularVelocity
  linear_acceleration: 1.0         # ActionCodes: linearAcceleration
  linear_deceleration: 0.8         # ActionCodes: linearDeceleration
  jerk_max: 10.0                   # ActionCodes: jerkMax
  lateral_acceleration: 0.2        # ActionCodes: lateralAcceleration
  lateral_deceleration: 0.15       # ActionCodes: lateralDeceleration
  position_tolerance: 0.25         # ActionCodes: positionTolerance
  angular_tolerance: 0.025         # ActionCodes: angularTolerance
  creep_distance: 0.02             # ActionCodes: creepDistance
  creep_velocity: 0.02             # ActionCodes: creepVelocity
  exit_velocity: 0.4               # ActionCodes: exitVelocity

dimensions:
  length_front: 0.465              # ActionCodes: lengthFront
  length_rear: 0.465               # ActionCodes: lengthRear
  width_left: 0.365                # ActionCodes: widthLeft
  width_right: 0.365               # ActionCodes: widthRight
  height_top: 0.333                # ActionCodes: heightTop
  height_bottom: 0.333             # ActionCodes: heightBottom
  length: 0.93                     # front + rear
  width: 0.73                      # left + right
  weight: 150.0
  payload_capacity: 500.0

sensors:
  obstacle_sensor:
    num: 2
    sensor_0:
      fov_min_rad: -0.5236         # -pi/6 (ActionCodes: minObsFOV)
      fov_max_rad: 0.5236          # +pi/6 (ActionCodes: maxObsFOV)
      range_m: 3.0                 # ActionCodes: range
      range_planning_m: 3.0        # ActionCodes: rangePlanning
      range_warning_m: 2.0         # ActionCodes: rangeWarning
      range_critical_m: 1.0        # ActionCodes: rangeCritical
  barcode_reader:
    enabled: true
    debounce_ms: 5
    failure_threshold: 5
  imu:
    enabled: true
    noise_stddev_deg: 3.0

battery:
  charge_duration_s: 450           # ActionCodes: chargeDuration
  discharge_duration_s: 60000      # ActionCodes: dischargeDuration
  motion_energy_factor: 1.02
  attachment_energy_factor: 1.02
  critical_threshold_pct: 20
  initial_charge_pct: 100

obstacle_thresholds:
  critical_m: 1.0                  # ActionCodes: rangeCritical
  warning_m: 2.0                   # ActionCodes: rangeWarning
  planning_m: 3.0                  # ActionCodes: rangePlanning

safety_fields:
  front: 1.5                      # ActionCodes: safetyZone.front
  rear: 0.5                       # ActionCodes: safetyZone.rear
  left: 0.5                       # ActionCodes: safetyZone.left
  right: 0.5                      # ActionCodes: safetyZone.right

attachment:
  type: "lifter"                   # ActionCodes: Params.attachment = "Lifter"
  load_time_s: 2.0                 # ActionCodes: motion.loadingTime
  unload_time_s: 2.0               # ActionCodes: motion.unloadingTime
  pre_raise_distance_pick: 1.0     # ActionCodes: lifterPreRaiseDistance
  pre_raise_distance_drop: 1.0     # ActionCodes: lifterPreRaiseDistanceDrop

mpc:
  num_opt_vars: 13                 # ActionCodes: numOptVars (not 12)
  dt: 0.1
  position_weight: 1.0
  velocity_weight: 0.0
  weight_scale: 0.06               # ActionCodes: weightScale (not 0.05)
  velocity_weight_threshold: 0.2   # ActionCodes: velocityWeightThreshold
  jerk_scale: 1.0
  acceleration_scale: 1.0
  final_position_offset: 0.02      # ActionCodes: finalPositionOffset (not 0.015)
  final_velocity_threshold: 0.05
  osqp_iterations: 500
  osqp_eps_abs: 0.01
  osqp_eps_rel: 0.01

behavior_tree: "default_amr.xml"

action_codes:
  move: 0
  charge_dock: 2
  start_charging: 3
  charge_undock: 4
  start_loading: 14
  start_unloading: 15
  reset_errors: 31
  hard_reset: 51

response_codes:
  reached_dock: 10
  reached_predock: 8
  charging_stopped: 18
  charging_error: 501
  load_error: 401
  unload_error: 402
