# Differential Drive AMR — Generic Preset
# Copy this file and change values for YOUR robot.
#
# Usage: ROBOT=my_robot docker compose up
# Place your file at: configs/robots/my_robot.yaml

name: "DiffDrive_AMR"
type: differential_drive         # Options: differential_drive, unidirectional, omnidirectional

motion:
  max_linear_velocity: 2.0       # m/s — max forward speed
  min_linear_velocity: 0.02      # m/s — minimum before stopping
  max_angular_velocity: 2.5      # rad/s — max rotation speed
  min_angular_velocity: 0.02     # rad/s
  linear_acceleration: 0.8       # m/s² — how fast it speeds up
  linear_deceleration: 0.8       # m/s² — how fast it slows down
  jerk_max: 10.0                 # m/s³ — smoothness of acceleration
  position_tolerance: 0.07       # m — "close enough" to target
  angular_tolerance: 0.025       # rad — "close enough" heading
  creep_distance: 0.02           # m — final approach distance
  creep_velocity: 0.02           # m/s — final approach speed
  exit_velocity: 0.4             # m/s — speed when leaving a node

dimensions:
  length: 0.8                    # m
  width: 0.6                     # m
  height: 0.3                    # m
  weight: 50.0                   # kg (empty)
  payload_capacity: 500.0        # kg
  wheel_separation: 0.5          # m — distance between wheels
  wheel_radius: 0.075            # m

sensors:
  lidar:
    enabled: true
    type: "2d"                   # Options: 2d, 3d
    fov_deg: 360                 # Field of view in degrees
    range_m: 5.0                 # Max detection range
    rays: 360                    # Number of rays
    height_m: 0.15               # Mounting height from ground
    noise_stddev_m: 0.03         # Gaussian noise standard deviation
  barcode_reader:
    enabled: true
    debounce_ms: 5               # Minimum time between reads
    failure_threshold: 5         # Consecutive failures before "failing"
  imu:
    enabled: true
    noise_stddev_deg: 3.0        # Heading noise

battery:
  charge_duration_s: 600         # Seconds to full charge
  discharge_duration_s: 54000    # Seconds of operation (15 hours)
  motion_energy_factor: 1.05     # Energy multiplier when moving
  attachment_energy_factor: 1.0  # Energy multiplier when attachment active
  critical_threshold_pct: 20     # Seek charger below this
  initial_charge_pct: 100        # Starting charge

obstacle_thresholds:
  critical_m: 0.7               # Emergency stop distance
  warning_m: 0.8                # Decelerate distance
  planning_m: 1.5               # Replan path distance

attachment:
  type: "none"                   # Options: none, conveyor, lifter, tug
  load_time_s: 3.0
  unload_time_s: 3.0

mpc:                             # Model Predictive Controller params
  num_opt_vars: 12
  dt: 0.1                        # seconds
  position_weight: 1.0
  velocity_weight: 0.0
  weight_scale: 0.05
  jerk_scale: 1.0
  acceleration_scale: 1.0
  final_position_offset: 0.015
  final_velocity_threshold: 0.05
  osqp_iterations: 500
  osqp_eps_abs: 0.01
  osqp_eps_rel: 0.01

behavior_tree: "default_amr.xml"

# Action codes — customize for your robot's firmware
action_codes:
  move: 0
  charge_dock: 2
  start_charging: 3
  charge_undock: 4
  start_loading: 14
  start_unloading: 15
  reset_errors: 31
  hard_reset: 51

# Response codes — what the robot sends back
response_codes:
  reached_dock: 10
  reached_predock: 8
  charging_stopped: 18
  charging_error: 501
  load_error: 401
  unload_error: 402
