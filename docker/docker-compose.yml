# ============================================================
# Robotic Digital Twin — Full Stack Services
# ============================================================
# Usage: cp docker/.env.docker.example docker/.env && docker compose -f docker/docker-compose.yml up --build
# All secrets are read from docker/.env (not committed to git).

services:
  # ── Main application: C++ FMS + Python API ──
  rdt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rdt-app
    ports:
      - "65123:65123"  # C++ TCP server (robot protocol V1)
      - "7012:7012"    # C++ REST server (fleet API)
      - "8029:8029"    # Python FastAPI (API + intelligence)
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      influxdb:
        condition: service_started
      mosquitto:
        condition: service_healthy
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER:-rdt}:${MONGO_PASSWORD:-changeme}@mongodb:27017
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-changeme}
      - INFLUXDB_ORG=rdt
      - INFLUXDB_BUCKET=fleet_telemetry
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-fms}:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_BROKER_WS_URL=ws://mosquitto:9001
      - VDA5050_MANUFACTURER=RDT
      - VDA5050_INTERFACE_NAME=uagv
      - VDA5050_VERSION=2.0.0
      - WAREHOUSE_CONFIG=simple_grid
      - ROBOT_CONFIG=differential_drive
      - FMS_TCP_PORT=65123
      - FMS_REST_PORT=7012
      - API_PORT=8029
      - API_KEY=${API_KEY:-}
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8029/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MongoDB: state IPC between C++ and Python ──
  mongodb:
    image: mongo:7
    container_name: rdt-mongodb
    ports:
      - "127.0.0.1:27017:27017"  # localhost only
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-rdt}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER:-rdt}", "-p", "${MONGO_PASSWORD:-changeme}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ: task queue + event bus ──
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rdt-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"    # localhost only
      - "127.0.0.1:15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis: real-time cache (robot positions, telemetry) ──
  redis:
    image: redis:7-alpine
    container_name: rdt-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6380:6379"  # mapped to 6380 to avoid local Redis conflict

  # ── InfluxDB: time-series telemetry storage ──
  influxdb:
    image: influxdb:2
    container_name: rdt-influxdb
    ports:
      - "127.0.0.1:8086:8086"  # localhost only
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: rdt
      DOCKER_INFLUXDB_INIT_BUCKET: fleet_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-changeme}
    volumes:
      - influx_data:/var/lib/influxdb2

  # ── Mosquitto: MQTT broker for VDA5050 protocol ──
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rdt-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"  # WebSocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── ROS2 Bridge: nav2 integration (Phase 10) ──
  ros2_bridge:
    image: ros:humble
    container_name: rdt-ros2-bridge
    volumes:
      - ../python/ros2_bridge:/ros2_ws/src/ros2_bridge
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               pip3 install --quiet httpx &&
               python3 -c 'from ros2_bridge.bridge import ROS2Bridge; print(\"ROS2 Bridge ready\")' &&
               tail -f /dev/null"
    depends_on:
      - rdt
    environment:
      - FMS_URL=http://rdt:7012
      - ROS_DOMAIN_ID=0
    restart: unless-stopped

  # ── Grafana: dashboards for telemetry visualization ──
  grafana:
    image: grafana/grafana:latest
    container_name: rdt-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mongo_data:
  influx_data:
  grafana_data:
  mosquitto_data:
