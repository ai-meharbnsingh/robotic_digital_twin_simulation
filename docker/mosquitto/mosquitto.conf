# ──────────────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration
# ──────────────────────────────────────────────────────
#
# SECURITY NOTE:
#   allow_anonymous true is for LOCAL DEVELOPMENT ONLY.
#   For production deployments:
#     1. Set allow_anonymous false
#     2. Uncomment password_file below
#     3. Generate credentials: mosquitto_passwd -c /mosquitto/config/passwd mqtt_user
#     4. Enable TLS:
#        listener 8883
#        cafile /mosquitto/certs/ca.crt
#        certfile /mosquitto/certs/server.crt
#        keyfile /mosquitto/certs/server.key
#        require_certificate false
#     5. Disable plain TCP listener (1883) in production
#

# --- Listeners ---
listener 1883
listener 9001
protocol websockets

# --- Authentication ---
# Dev mode: anonymous access allowed
allow_anonymous true

# Production: uncomment these two lines and disable allow_anonymous
# password_file /mosquitto/config/passwd
# allow_anonymous false

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest stdout

# --- Message size limit (256KB matches MAX_MQTT_MESSAGE_SIZE in mqtt_client.py) ---
message_size_limit 262144
